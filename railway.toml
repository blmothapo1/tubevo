# ── Railway deployment config ────────────────────────────────────────
# https://docs.railway.app/reference/config-as-code
#
# The actual app lives in wealth_to_the_wise/, so we point Railway there.

[build]
builder = "DOCKERFILE"
dockerfilePath = "wealth_to_the_wise/Dockerfile"
watchPatterns = ["wealth_to_the_wise/**"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
