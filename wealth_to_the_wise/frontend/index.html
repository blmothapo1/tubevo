<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1" />
    <meta name="description" content="Tubevo — Automate your YouTube channel with AI-generated videos, scheduling, and analytics." />
    <meta property="og:title" content="Tubevo — YouTube on Autopilot" />
    <meta property="og:description" content="AI-powered video generation, scheduling, and upload automation for YouTube creators." />
    <meta property="og:url" content="https://tubevo.us" />
    <meta property="og:type" content="website" />
    <link rel="canonical" href="https://tubevo.us" />
    <title>Tubevo — YouTube on Autopilot</title>
    <script>
      // No-flash: apply theme before React renders
      (function(){try{var p=localStorage.getItem('tubevo-theme-preference');var t=(p==='dark'||p==='light')?p:(window.matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','dark')}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
