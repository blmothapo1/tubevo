# Alembic configuration for Tubevo backend.
#
# The actual database URL is read at runtime from backend.config.Settings
# (via env.py), so there's nothing secret in this file.

[alembic]
# Path to the migration directory (relative to this file).
script_location = alembic

# Template for new migration filenames.
# Includes a short hash prefix so files sort chronologically.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate slug at 40 chars to keep filenames manageable.
truncate_slug_length = 40

# sys.path prepend — so ``import backend.*`` works from the migrations.
prepend_sys_path = .

# Timezone for migration timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
